function fmtTime(ts){return new Date(ts).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}
function fmtDate(ts){
  const d=new Date(ts),now=new Date()
  if(d.toDateString()===now.toDateString())return'اليوم'
  const y=new Date(now);y.setDate(y.getDate()-1)
  if(d.toDateString()===y.toDateString())return'أمس'
  return d.toLocaleDateString('ar-EG',{weekday:'long',day:'numeric',month:'long'})
}
function timeAgo(ts){
  const d=Date.now()-new Date(ts).getTime()
  if(d<60000)return'الآن'
  if(d<3600000)return Math.floor(d/60000)+'د'
  if(d<86400000)return Math.floor(d/3600000)+'س'
  return Math.floor(d/86400000)+'ي'
}
function genCode(){return Math.random().toString(36).substring(2,8).toUpperCase()}

function Spin({s=22,c='#6366f1'}){
  return <div style={{width:s,height:s,border:`3px solid ${c}33`,borderTopColor:c,borderRadius:'50%',animation:'spin .7s linear infinite',flexShrink:0}}/>
}
function Avatar({user,size=40}){
  const c=user?.color||'#64748b'
  return <div style={{width:size,height:size,borderRadius:'50%',background:c+'22',border:`2px solid ${c}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.46,flexShrink:0}}>{user?.avatar||'👤'}</div>
}
function RoleTag({role,sm}){
  return <span style={{background:ROLE_COLOR[role]+'1a',color:ROLE_COLOR[role],fontSize:sm?9:10,fontWeight:700,padding:sm?'1px 5px':'2px 8px',borderRadius:20,border:`1px solid ${ROLE_COLOR[role]}33`,whiteSpace:'nowrap'}}>{ROLE_LABEL[role]}</span>
}
function ErrBox({msg}){
  if(!msg)return null
  return <div style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.25)',borderRadius:10,padding:'10px 14px',color:'#fca5a5',fontSize:12,lineHeight:1.6,marginBottom:12}}>⚠️ {msg}</div>

function Toggle({value,onChange}){

}

// ══════════════════════════════════════════
//  LOGIN SCREEN
// ══════════════════════════════════════════
function LoginScreen(){
  const [step,setStep]=React.useState(0)
  const [email,setEmail]=React.useState('')
  const [otp,setOtp]=React.useState(['','','','','',''])
  const [loading,setLoading]=React.useState(false)
  const [err,setErr]=React.useState('')
  const [countdown,setCountdown]=React.useState(0)

  React.useEffect(()=>{
    if(!countdown)return
    const t=setTimeout(()=>setCountdown(c=>c-1),1000)
    return()=>clearTimeout(t)
  },[countdown])

  async function sendOtp(){
    setErr('')
    const e=email.trim().toLowerCase()
    if(!e.includes('@')||!e.includes('.')){setErr('ادخل إيميل صحيح');return}
    setLoading(true)
    const{error}=await sb.auth.signInWithOtp({email:e,options:{shouldCreateUser:true}})
    setLoading(false)
    if(error){setErr('حدث خطأ: '+error.message);return}
    setCountdown(60);setStep(1)
  }

  async function verifyOtp(){
    setErr('')
    const code=otp.join('')
    if(code.length<6){setErr('ادخل الكود كامل');return}
    setLoading(true)
    const{error}=await sb.auth.verifyOtp({email:email.trim().toLowerCase(),token:code,type:'email'})
    setLoading(false)
    if(error){setErr('الكود غلط أو انتهت صلاحيته');return}
  }

  async function loginGoogle(){
    setLoading(true)
    const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin}})
    if(error){setErr('فشل الدخول بـ Google');setLoading(false)}
  }

  function otpKey(i,val){
    if(!/^\d*$/.test(val))return
    const n=[...otp];n[i]=val.slice(-1);setOtp(n)
    if(val&&i<5)document.getElementById('o'+( i+1))?.focus()
    if(!val&&i>0)document.getElementById('o'+(i-1))?.focus()
  }

  const WRAP={minHeight:'100dvh',background:'linear-gradient(135deg,#0f172a 0%,#1e1b4b 55%,#0f172a 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px 20px',direction:'rtl',position:'relative',overflow:'hidden'}
  const CARD={background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',borderRadius:24,padding:'36px 28px',width:'100%',maxWidth:420,boxShadow:'0 30px 60px rgba(0,0,0,.6)',position:'relative',zIndex:1}
  const BG=<>
    <div style={{position:'absolute',width:500,height:500,borderRadius:'50%',background:'radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 70%)',top:-150,right:-150,pointerEvents:'none'}}/>
    <div style={{position:'absolute',width:400,height:400,borderRadius:'50%',background:'radial-gradient(circle,rgba(14,165,233,.08) 0%,transparent 70%)',bottom:-100,left:-100,pointerEvents:'none'}}/>
  </>
  const LOGO=<div style={{textAlign:'center',marginBottom:32}}>
    <div style={{width:80,height:80,borderRadius:24,background:'linear-gradient(135deg,#6366f1,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:42,margin:'0 auto 16px',boxShadow:'0 14px 40px rgba(99,102,241,.45)'}}>🎓</div>
    <h1 style={{color:'#fff',margin:0,fontSize:28,fontWeight:800}}>EduChat</h1>
    <p style={{color:'#64748b',margin:'6px 0 0',fontSize:14}}>منصة التواصل التعليمي</p>
  </div>

  const PBtn=({ok,text,fn})=><button onClick={fn} disabled={loading||!ok}
    style={{width:'100%',padding:15,background:ok&&!loading?'linear-gradient(135deg,#6366f1,#7c3aed)':'rgba(255,255,255,.07)',border:'none',borderRadius:14,color:ok&&!loading?'#fff':'#475569',fontSize:16,fontWeight:700,cursor:ok&&!loading?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:ok&&!loading?'0 8px 24px rgba(99,102,241,.4)':'none',transition:'all .2s'}}>
    {loading?<Spin s={20} c="#fff"/>:text}
  </button>

  if(step===0)return(
    <div style={WRAP}>{BG}
      <div style={CARD}>{LOGO}
        <label style={{color:'#94a3b8',fontSize:13,display:'block',marginBottom:8}}>البريد الإلكتروني</label>
        <div style={{position:'relative',marginBottom:14}}>
          <span style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',fontSize:18}}>✉️</span>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendOtp()} placeholder="example@gmail.com" autoFocus
            style={{width:'100%',padding:'14px 48px 14px 14px',background:'rgba(255,255,255,.07)',border:'1.5px solid rgba(255,255,255,.1)',borderRadius:14,color:'#fff',fontSize:15,outline:'none',boxSizing:'border-box',direction:'ltr',transition:'border-color .2s'}}
            onFocus={e=>e.target.style.borderColor='#6366f1'} onBlur={e=>e.target.style.borderColor='rgba(255,255,255,.1)'}/>
        </div>
        <ErrBox msg={err}/>
        <div style={{marginBottom:14}}><PBtn ok={email.includes('@')&&email.includes('.')} text="📧 إرسال كود التحقق" fn={sendOtp}/></div>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <div style={{flex:1,height:1,background:'rgba(255,255,255,.08)'}}/><span style={{color:'#475569',fontSize:12}}>أو</span><div style={{flex:1,height:1,background:'rgba(255,255,255,.08)'}}/>
        </div>
        <button onClick={loginGoogle} disabled={loading}
          style={{width:'100%',padding:'13px 20px',background:'rgba(255,255,255,.07)',border:'1.5px solid rgba(255,255,255,.1)',borderRadius:14,color:'#fff',fontSize:15,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,transition:'all .2s'}}
          onMouseEnter={e=>e.currentTarget.style.borderColor='#4285F4'} onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(255,255,255,.1)'}>
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          تسجيل الدخول بـ Google
        </button>
      </div>
    </div>
  )

  return(
    <div style={WRAP}>{BG}
      <div style={CARD}>
        <button onClick={()=>{setStep(0);setOtp(['','','','','','']);setErr('')}} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',marginBottom:20,display:'flex',alignItems:'center',gap:6,fontSize:13}}>← رجوع</button>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:72,height:72,borderRadius:20,background:'linear-gradient(135deg,rgba(99,102,241,.2),rgba(14,165,233,.15))',border:'1px solid rgba(99,102,241,.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 16px'}}>📧</div>
          <h2 style={{color:'#fff',fontSize:20,fontWeight:800,margin:'0 0 8px'}}>تحقق من إيميلك</h2>
          <p style={{color:'#64748b',fontSize:13,lineHeight:1.7,marginBottom:8}}>أرسلنا كود لـ</p>
          <div style={{background:'rgba(255,255,255,.07)',borderRadius:10,padding:'8px 16px',display:'inline-block',color:'#94a3b8',fontWeight:600,fontSize:14,direction:'ltr'}}>{email}</div>
          <div style={{marginTop:10,background:'rgba(16,185,129,.08)',border:'1px solid rgba(16,185,129,.2)',borderRadius:10,padding:'8px 14px',color:'#34d399',fontSize:12}}>
            💡 افتح إيميلك وانسخ الكود — لو مش لاقيه افتح Spam
          </div>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:20,direction:'ltr'}}>
          {otp.map((d,i)=>(
            <input key={i} id={'o'+i} type="tel" inputMode="numeric" maxLength={1} value={d}
              onChange={e=>otpKey(i,e.target.value)}
              onKeyDown={e=>{if(e.key==='Backspace'&&!otp[i]&&i>0)document.getElementById('o'+(i-1))?.focus()}}
              style={{width:48,height:58,textAlign:'center',fontSize:24,fontWeight:700,background:'rgba(255,255,255,.07)',border:`2px solid ${d?'#6366f1':'rgba(255,255,255,.12)'}`,borderRadius:14,color:'#fff',outline:'none',transition:'border-color .2s'}}
              onFocus={e=>e.target.style.borderColor='#6366f1'} onBlur={e=>e.target.style.borderColor=d?'#6366f1':'rgba(255,255,255,.12)'}/>
          ))}
        </div>
        <ErrBox msg={err}/>
        <div style={{marginBottom:14}}><PBtn ok={otp.join('').length===6} text="تحقق وادخل ✓" fn={verifyOtp}/></div>
        <div style={{textAlign:'center'}}>
          {countdown>0
            ?<span style={{color:'#64748b',fontSize:13}}>إعادة الإرسال بعد <strong style={{color:'#94a3b8'}}>{countdown}</strong> ثانية</span>
            :<button onClick={()=>{sendOtp();setOtp(['','','','','',''])}} style={{background:'none',border:'none',color:'#6366f1',fontSize:13,cursor:'pointer',fontWeight:600,textDecoration:'underline'}}>لم يصلك الكود؟ أعد الإرسال</button>
          }
        </div>
      </div>
    </div>
  )
}

// ══════════════════════════════════════════
//  PROFILE SETUP
// ══════════════════════════════════════════
function ProfileSetup({authUser,onDone}){
  const [name,setName]=React.useState(authUser.user_metadata?.full_name||authUser.user_metadata?.name||'')
  const [avatar,setAvatar]=React.useState('👤')
  const [color,setColor]=React.useState('#6366f1')
  const [loading,setLoading]=React.useState(false)
  const [err,setErr]=React.useState('')

  async function save(){
    setErr('');if(!name.trim()){setErr('ادخل اسمك');return}
    setLoading(true)
    const{error}=await sb.from('users').upsert({id:authUser.id,email:authUser.email,name:name.trim(),avatar,color}).select().single()
    if(error){setErr(error.message);setLoading(false);return}
    onDone()
  }

  return(
    <div style={{minHeight:'100dvh',background:'linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,direction:'rtl'}}>
      <div style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',borderRadius:24,padding:'36px 28px',width:'100%',maxWidth:440,boxShadow:'0 30px 60px rgba(0,0,0,.6)'}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{width:78,height:78,borderRadius:'50%',background:color+'25',border:`3px solid ${color}55`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:38,margin:'0 auto 14px'}}>{avatar}</div>
          <h2 style={{color:'#fff',fontSize:22,fontWeight:800,margin:'0 0 6px'}}>أهلاً! أكمل ملفك الشخصي</h2>
          <p style={{color:'#64748b',fontSize:13}}>اختار أيقونتك ولونك المفضل</p>
        </div>
        <p style={{color:'#64748b',fontSize:12,marginBottom:8}}>اختار أيقونة</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8,marginBottom:16}}>
          {AVATARS.map(a=><button key={a} onClick={()=>setAvatar(a)} style={{background:avatar===a?'rgba(99,102,241,.2)':'rgba(255,255,255,.05)',border:avatar===a?'2px solid #6366f1':'1px solid rgba(255,255,255,.08)',borderRadius:12,padding:'10px 4px',fontSize:24,cursor:'pointer'}}>{a}</button>)}
        </div>
        <p style={{color:'#64748b',fontSize:12,marginBottom:10}}>اختار لون</p>
        <div style={{display:'flex',gap:8,marginBottom:18,flexWrap:'wrap'}}>
          {COLORS.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:30,height:30,borderRadius:'50%',background:c,border:color===c?'3px solid #fff':'2px solid transparent',cursor:'pointer'}}/>)}
        </div>
        <label style={{color:'#94a3b8',fontSize:13,display:'block',marginBottom:8}}>اسمك الكامل</label>
        <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&save()} placeholder="ادخل اسمك" autoFocus
          style={{width:'100%',padding:'13px 14px',background:'rgba(255,255,255,.07)',border:'1.5px solid rgba(255,255,255,.1)',borderRadius:14,color:'#fff',fontSize:15,outline:'none',marginBottom:14,boxSizing:'border-box'}}
          onFocus={e=>e.target.style.borderColor='#6366f1'} onBlur={e=>e.target.style.borderColor='rgba(255,255,255,.1)'}/>
        <ErrBox msg={err}/>
        <button onClick={save} disabled={loading||!name.trim()}
          style={{width:'100%',padding:15,background:name.trim()&&!loading?'linear-gradient(135deg,#6366f1,#7c3aed)':'rgba(255,255,255,.07)',border:'none',borderRadius:14,color:name.trim()&&!loading?'#fff':'#475569',fontSize:16,fontWeight:700,cursor:name.trim()?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          {loading?<Spin s={20} c="#fff"/>:'ابدأ الاستخدام 🎉'}
        </button>
      </div>
    </div>
  )
}

function GroupsList({user,groups,messages,users,onOpen,onNav,onJoin,onCreateGroup}){
  const [search,setSearch]=React.useState('')
  const [showJoin,setShowJoin]=React.useState(false)
  const [joinCode,setJoinCode]=React.useState('')
  const [joinLoading,setJoinLoading]=React.useState(false)
  const [joinErr,setJoinErr]=React.useState('')

  const filtered=groups.filter(g=>g.name.includes(search))

  async function doJoin(){
    setJoinErr('');if(!joinCode.trim())return
    setJoinLoading(true)
    const{data:grp}=await sb.from('groups').select('*').eq('join_code',joinCode.trim().toUpperCase()).single()
    if(!grp){setJoinErr('كود غلط — تأكد من الكود وحاول مرة أخرى');setJoinLoading(false);return}
    const{error}=await sb.from('group_members').upsert({group_id:grp.id,user_id:user.id})
    setJoinLoading(false)
    if(error){setJoinErr(error.message);return}
    setShowJoin(false);setJoinCode('');onJoin()
  }

  return(
    <div style={{height:'100dvh',background:'#0d1420',display:'flex',flexDirection:'column',direction:'rtl'}}>
      {/* Header */}
      <div style={{background:'linear-gradient(180deg,#14102a 0%,#1a2235 100%)',padding:'44px 18px 14px',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{position:'relative'}}>
              <Avatar user={user} size={46}/>
              <div style={{position:'absolute',bottom:1,right:1,width:12,height:12,borderRadius:'50%',background:'#22c55e',border:'2px solid #1a2235'}}/>
            </div>
            <div>
              <div style={{color:'#f1f5f9',fontWeight:700,fontSize:16}}>{user.name}</div>
              <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2}}><RoleTag role={user.role}/></div>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {user.role==='admin'&&<button onClick={()=>onNav('admin')} style={{width:38,height:38,background:'rgba(99,102,241,.15)',border:'1px solid rgba(99,102,241,.3)',borderRadius:12,color:'#a5b4fc',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>🛡️</button>}
            <button onClick={()=>onNav('settings')} style={{width:38,height:38,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:12,color:'#94a3b8',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>⚙️</button>

              ➕ مجموعة جديدة
            </button>
          )}
          {user.role==='student'&&(
            <button onClick={()=>setShowJoin(true)} style={{flex:1,padding:'10px 14px',background:'rgba(16,185,129,.15)',border:'1px solid rgba(16,185,129,.3)',borderRadius:12,color:'#34d399',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              🔑 انضم بكود

          )}

        {filtered.length===0?(
          <div style={{textAlign:'center',padding:'50px 24px',color:'#475569'}}>
            <div style={{fontSize:52,marginBottom:14}}>💬</div>
            <div style={{fontSize:16,color:'#64748b',fontWeight:600,marginBottom:6}}>
              {user.role==='student'?'لا توجد مجموعات':'لا توجد مجموعات بعد'}
            </div>
            <div style={{fontSize:13}}>
              {user.role==='student'?'اطلب كود الانضمام من المدرس':'اضغط "مجموعة جديدة" للبدء'}
            </div>
          </div>
        ):filtered.map(g=>{
          const msgs=messages[g.id]||[]
          const last=msgs[msgs.length-1]
          const lastSender=last?users.find(u=>u.id===last.sender_id):null
          return(
            <div key={g.id} onClick={()=>onOpen(g)} style={{padding:'13px 18px',cursor:'pointer',display:'flex',gap:14,alignItems:'center',borderBottom:'1px solid rgba(255,255,255,.04)',transition:'background .15s'}}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.03)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{width:54,height:54,borderRadius:18,background:g.color+'18',border:`2px solid ${g.color}33`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,flexShrink:0}}>{g.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                  <span style={{color:'#f1f5f9',fontWeight:700,fontSize:15,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'68%'}}>{g.name}</span>
                  {last&&<span style={{color:'#475569',fontSize:11,flexShrink:0}}>{timeAgo(last.created_at)}</span>}
                </div>
                <span style={{color:'#64748b',fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}}>
                  {last?`${lastSender?.avatar||''} ${last.text.split('\n')[0]}`:g.description||'لا توجد رسائل بعد'}
                </span>
              </div>
            </div>

      {/* Bottom nav */}
      <div style={{background:'#161f2e',borderTop:'1px solid rgba(255,255,255,.06)',display:'flex',flexShrink:0}}>

          <button key={t.id} onClick={()=>onNav(t.id)} style={{flex:1,background:'none',border:'none',cursor:'pointer',padding:'10px 0 8px',display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
            <span style={{fontSize:22}}>{t.icon}</span>
            <span style={{fontSize:10,color:t.id==='groups'?'#6366f1':'#475569',fontWeight:t.id==='groups'?700:400}}>{t.label}</span>

      {/* Join Modal */}
      {showJoin&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:24,direction:'rtl'}} onClick={e=>e.target===e.currentTarget&&setShowJoin(false)}>
          <div style={{background:'#1a2235',borderRadius:20,padding:'28px 24px',width:'100%',maxWidth:360,animation:'pop .2s ease'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <span style={{color:'#f1f5f9',fontWeight:700,fontSize:18}}>🔑 انضم لمجموعة</span>
              <button onClick={()=>setShowJoin(false)} style={{background:'rgba(255,255,255,.08)',border:'none',borderRadius:10,width:32,height:32,color:'#94a3b8',cursor:'pointer'}}>✕</button>
            </div>
            <p style={{color:'#64748b',fontSize:13,marginBottom:16}}>ادخل كود الانضمام اللي أعطاهولك المدرس</p>
            <input value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())} placeholder="مثال: ABC123" maxLength={8}
              style={{width:'100%',padding:'14px',background:'rgba(255,255,255,.07)',border:'1.5px solid rgba(255,255,255,.1)',borderRadius:14,color:'#fff',fontSize:20,outline:'none',textAlign:'center',letterSpacing:4,marginBottom:14,boxSizing:'border-box',direction:'ltr'}}
              onFocus={e=>e.target.style.borderColor='#6366f1'} onBlur={e=>e.target.style.borderColor='rgba(255,255,255,.1)'}/>
            <ErrBox msg={joinErr}/>
            <button onClick={doJoin} disabled={joinLoading||!joinCode.trim()}

              {joinLoading?<Spin s={20} c="#fff"/>:'انضم للمجموعة'}

          </div>
        </div>
      )}
    </div>
  )
}

// ══════════════════════════════════════════
//  CHAT SCREEN
// ══════════════════════════════════════════
function ChatScreen({user,users,group,messages,onSend,onReact,onBack}){
  const [text,setText]=React.useState('')
  const [msgType,setMsgType]=React.useState('general')
  const [pickerFor,setPickerFor]=React.useState(null)
  const [loadingMsgs,setLoadingMsgs]=React.useState(false)
  const endRef=React.useRef(null)

  const canSend=user.role==='admin'||user.role==='teacher'||(user.role==='student'&&!group.admin_only)
  const typeOpts=user.role==='admin'?['schedule','announcement','general']:['lesson','homework','resource','general']

  React.useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[messages?.length])

  function send(){
    if(!text.trim()||!canSend)return
    onSend(group.id,text.trim(),msgType);setText('')
  }

  const grouped=[]
  let lastD=null
  ;(messages||[]).forEach(m=>{
    const d=fmtDate(m.created_at)
    if(d!==lastD){grouped.push({type:'date',d});lastD=d}
    grouped.push({type:'msg',m})
  })

  return(
    <div style={{height:'100dvh',background:'#0d1420',display:'flex',flexDirection:'column',direction:'rtl'}} onClick={()=>setPickerFor(null)}>
      {/* Header */}
      <div style={{background:'linear-gradient(180deg,#14102a 0%,#1a2235 100%)',padding:'44px 16px 12px',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={onBack} style={{width:38,height:38,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:12,color:'#94a3b8',fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
          <div style={{width:46,height:46,borderRadius:15,background:group.color+'18',border:`2px solid ${group.color}33`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0}}>{group.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:'#f1f5f9',fontWeight:700,fontSize:15,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{group.name}</div>
            {group.join_code&&(user.role==='admin'||user.role==='teacher')&&(
              <div style={{color:'#6366f1',fontSize:11,fontWeight:700,marginTop:2}}>كود الانضمام: <span style={{direction:'ltr',display:'inline-block',letterSpacing:1}}>{group.join_code}</span></div>
            )}
          </div>
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'14px 16px'}}>
        {(messages||[]).length===0?(
          <div style={{textAlign:'center',padding:'50px 20px',color:'#475569'}}>
            <div style={{fontSize:48,marginBottom:12}}>{group.icon}</div>
            <div style={{fontSize:15,color:'#64748b',marginBottom:6}}>لا توجد رسائل بعد</div>
            <div style={{fontSize:13}}>{canSend?'ابدأ بإرسال رسالة':'انتظر رسائل من المدرس'}</div>
          </div>
        ):grouped.map((item,idx)=>{
          if(item.type==='date')return(
            <div key={idx} style={{textAlign:'center',margin:'14px 0'}}>
              <span style={{background:'rgba(255,255,255,.07)',color:'#64748b',fontSize:11,padding:'4px 14px',borderRadius:20}}>{item.d}</span>
            </div>
          )
          const m=item.m
          const sender=users.find(u=>u.id===m.sender_id)
          const mine=m.sender_id===user.id
          const info=MSG_TYPES[m.type]||MSG_TYPES.general
          const totalR=Object.values(m.reactions||{}).reduce((s,a)=>s+a.length,0)
          return(
            <div key={m.id} style={{display:'flex',flexDirection:mine?'row-reverse':'row',gap:8,marginBottom:14,alignItems:'flex-end',animation:'fadeUp .2s ease'}}>
              {!mine&&<Avatar user={sender} size={30}/>}
              <div style={{maxWidth:'76%',position:'relative'}}>
                {!mine&&<div style={{marginBottom:4,display:'flex',alignItems:'center',gap:6}}><span style={{color:sender?.color||'#94a3b8',fontSize:12,fontWeight:700}}>{sender?.name}</span>{sender&&<RoleTag role={sender.role} sm/>}</div>}
                {m.type&&m.type!=='general'&&<div style={{display:'inline-flex',alignItems:'center',gap:4,marginBottom:4,background:info.color+'18',border:`1px solid ${info.color}33`,borderRadius:20,padding:'2px 10px',color:info.color,fontSize:10,fontWeight:700}}>{info.label}</div>}
                <div onDoubleClick={e=>{e.stopPropagation();setPickerFor(m.id)}}
                  style={{background:mine?'linear-gradient(135deg,#6366f1,#7c3aed)':'rgba(255,255,255,.07)',border:mine?'none':'1px solid rgba(255,255,255,.09)',borderRadius:mine?'18px 4px 18px 18px':'4px 18px 18px 18px',padding:'11px 13px',cursor:'default',boxShadow:mine?'0 4px 14px rgba(99,102,241,.25)':'none',position:'relative'}}>
                  <p style={{color:mine?'#fff':'#e2e8f0',margin:0,fontSize:14,lineHeight:1.65,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{m.text}</p>
                  <div style={{color:mine?'rgba(255,255,255,.55)':'#64748b',fontSize:10,marginTop:5,textAlign:'left',direction:'ltr'}}>{fmtTime(m.created_at)}{mine&&' ✓✓'}</div>
                  {pickerFor===m.id&&(
                    <div onClick={e=>e.stopPropagation()} style={{position:'absolute',bottom:'calc(100% + 8px)',right:mine?0:'auto',left:mine?'auto':0,zIndex:100,background:'#1e293b',border:'1px solid rgba(255,255,255,.1)',borderRadius:20,padding:'8px 12px',display:'flex',gap:4,boxShadow:'0 10px 30px rgba(0,0,0,.6)',whiteSpace:'nowrap'}}>
                      {EMOJIS.map(e=><button key={e} onClick={()=>{onReact(group.id,m.id,e);setPickerFor(null)}} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,padding:'4px 3px',borderRadius:8,transition:'transform .1s'}} onMouseEnter={ev=>ev.target.style.transform='scale(1.3)'} onMouseLeave={ev=>ev.target.style.transform='scale(1)'}>{e}</button>)}
                    </div>
                  )}
                </div>
                {totalR>0&&(
                  <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:5,justifyContent:mine?'flex-end':'flex-start'}}>
                    {Object.entries(m.reactions||{}).map(([e,arr])=>arr.length>0?(
                      <button key={e} onClick={()=>onReact(group.id,m.id,e)}
                        style={{background:arr.includes(user.id)?'rgba(99,102,241,.2)':'rgba(255,255,255,.08)',border:arr.includes(user.id)?'1px solid rgba(99,102,241,.5)':'1px solid rgba(255,255,255,.1)',borderRadius:20,padding:'2px 8px',fontSize:12,color:'#e2e8f0',cursor:'pointer',display:'flex',alignItems:'center',gap:3}}>
                        {e}<span style={{fontSize:10,color:'#94a3b8'}}>{arr.length}</span>
                      </button>
                    ):null)}
                  </div>
                )}
              </div>
            </div>
          )
        })}
        <div ref={endRef}/>
      </div>

      {/* Input */}
      <div style={{background:'#1a2235',borderTop:'1px solid rgba(255,255,255,.06)',padding:'10px 14px 14px',flexShrink:0}}>
        {canSend?(
          <>
            <div style={{display:'flex',gap:6,marginBottom:8,overflowX:'auto',paddingBottom:2}}>
              {typeOpts.map(t=>(
                <button key={t} onClick={()=>setMsgType(t)} style={{background:msgType===t?MSG_TYPES[t].color+'25':'rgba(255,255,255,.05)',border:msgType===t?`1.5px solid ${MSG_TYPES[t].color}55`:'1.5px solid rgba(255,255,255,.08)',borderRadius:20,padding:'5px 12px',color:msgType===t?MSG_TYPES[t].color:'#64748b',fontSize:11,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',transition:'all .2s'}}>
                  {MSG_TYPES[t].label}
                </button>
              ))}
            </div>
            <div style={{display:'flex',gap:10,alignItems:'flex-end'}}>
              <textarea value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}} placeholder="اكتب رسالتك..." rows={2}
                style={{flex:1,background:'rgba(255,255,255,.07)',border:'1.5px solid rgba(255,255,255,.09)',borderRadius:16,padding:'12px 14px',color:'#e2e8f0',fontSize:14,resize:'none',outline:'none',lineHeight:1.5,transition:'border-color .2s'}}
                onFocus={e=>e.target.style.borderColor='rgba(99,102,241,.5)'} onBlur={e=>e.target.style.borderColor='rgba(255,255,255,.09)'}/>
              <button onClick={send} disabled={!text.trim()} style={{width:48,height:48,borderRadius:14,background:text.trim()?'linear-gradient(135deg,#6366f1,#7c3aed)':'rgba(255,255,255,.07)',border:'none',cursor:text.trim()?'pointer':'default',fontSize:20,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:text.trim()?'0 4px 14px rgba(99,102,241,.35)':'none',transition:'all .2s'}}>✈️</button>
            </div>
          </>
        ):(
          <div style={{background:'rgba(16,185,129,.07)',border:'1px solid rgba(16,185,129,.18)',borderRadius:16,padding:'12px 16px'}}>
            <div style={{color:'#34d399',fontSize:13,fontWeight:700,textAlign:'center',marginBottom:6}}>👨‍🎓 اضغط مرتين على أي رسالة لإضافة تفاعل</div>
            <div style={{display:'flex',justifyContent:'center',gap:6}}>
              {EMOJIS.slice(0,6).map(e=><button key={e} onClick={()=>{const last=(messages||[])[( messages||[]).length-1];if(last)onReact(group.id,last.id,e)}} style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.09)',borderRadius:20,padding:'5px 10px',fontSize:18,cursor:'pointer'}}>{e}</button>)}
            </div>
          </div>
        )}
      </div>
    </div>
  )
}

// ══════════════════════════════════════════
//  CREATE GROUP MODAL
// ══════════════════════════════════════════
function CreateGroupModal({user,onDone,onClose}){
  const ICONS=['📢','📐','🔬','📚','🎨','💻','🌍','📊','🎵','🏃']
  const [name,setName]=React.useState('')
  const [desc,setDesc]=React.useState('')
  const [icon,setIcon]=React.useState('📚')
  const [color,setColor]=React.useState('#6366f1')
  const [adminOnly,setAdminOnly]=React.useState(false)
  const [loading,setLoading]=React.useState(false)
  const [err,setErr]=React.useState('')

  async function create(){
    setErr('');if(!name.trim()){setErr('ادخل اسم المجموعة');return}
    setLoading(true)
    const code=genCode()
    const{data,error}=await sb.from('groups').insert({name:name.trim(),description:desc,icon,color,admin_only:adminOnly,created_by:user.id,join_code:code}).select().single()
    if(error){setErr(error.message);setLoading(false);return}
    await sb.from('group_members').insert({group_id:data.id,user_id:user.id})
    setLoading(false);onDone(data)
  }

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:1000,display:'flex',alignItems:'flex-end',direction:'rtl'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#1a2235',borderRadius:'22px 22px 0 0',padding:'0 0 24px',width:'100%',maxHeight:'92dvh',overflowY:'auto',animation:'slideUp .3s ease'}}>
        <div style={{padding:'16px 18px',borderBottom:'1px solid rgba(255,255,255,.07)',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#1a2235',zIndex:1}}>
          <span style={{color:'#f1f5f9',fontWeight:700,fontSize:16}}>➕ مجموعة جديدة</span>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.08)',border:'none',borderRadius:10,width:32,height:32,color:'#94a3b8',cursor:'pointer',fontSize:16}}>✕</button>
        </div>
        <div style={{padding:'20px 18px'}}>
          <p style={{color:'#64748b',fontSize:12,marginBottom:8}}>اختار أيقونة</p>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
            {ICONS.map(ic=><button key={ic} onClick={()=>setIcon(ic)} style={{width:42,height:42,background:icon===ic?'rgba(99,102,241,.2)':'rgba(255,255,255,.05)',border:icon===ic?'2px solid #6366f1':'1px solid rgba(255,255,255,.08)',borderRadius:10,fontSize:22,cursor:'pointer'}}>{ic}</button>)}
          </div>
          <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
            {COLORS.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:28,height:28,borderRadius:'50%',background:c,border:color===c?'3px solid #fff':'2px solid transparent',cursor:'pointer'}}/>)}
          </div>
          <label style={{color:'#94a3b8',fontSize:13,display:'block',marginBottom:7}}>اسم المجموعة *</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="مثال: رياضيات الصف الثالث"
            style={{width:'100%',padding:'12px 14px',background:'rgba(255,255,255,.07)',border:'1.5px solid rgba(255,255,255,.1)',borderRadius:12,color:'#fff',fontSize:15,outline:'none',marginBottom:12,boxSizing:'border-box'}}
            onFocus={e=>e.target.style.borderColor='#6366f1'} onBlur={e=>e.target.style.borderColor='rgba(255,255,255,.1)'}/>
          <label style={{color:'#94a3b8',fontSize:13,display:'block',marginBottom:7}}>وصف (اختياري)</label>
          <input value={desc} onChange={e=>setDesc(e.target.value)}
            style={{width:'100%',padding:'12px 14px',background:'rgba(255,255,255,.07)',border:'1.5px solid rgba(255,255,255,.1)',borderRadius:12,color:'#fff',fontSize:14,outline:'none',marginBottom:14,boxSizing:'border-box'}}
            onFocus={e=>e.target.style.borderColor='#6366f1'} onBlur={e=>e.target.style.borderColor='rgba(255,255,255,.1)'}/>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',background:'rgba(255,255,255,.05)',borderRadius:12,marginBottom:20}}>
            <div>
              <div style={{color:'#f1f5f9',fontSize:14,fontWeight:600}}>🔒 للمدير فقط</div>
              <div style={{color:'#64748b',fontSize:12}}>فقط الأدمن يقدر يبعت رسائل</div>
            </div>
            <Toggle value={adminOnly} onChange={setAdminOnly}/>
          </div>
          <ErrBox msg={err}/>
          <button onClick={create} disabled={loading||!name.trim()}
            style={{width:'100%',padding:14,background:name.trim()&&!loading?'linear-gradient(135deg,#6366f1,#7c3aed)':'rgba(255,255,255,.07)',border:'none',borderRadius:14,color:name.trim()&&!loading?'#fff':'#475569',fontSize:16,fontWeight:700,cursor:name.trim()?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            {loading?<Spin s={20} c="#fff"/>:'إنشاء المجموعة'}
          </button>
        </div>
      </div>
    </div>
  )
}

// ══════════════════════════════════════════
//  SETTINGS SCREEN
// ══════════════════════════════════════════
function SettingsScreen({user,onUserUpdate,onLogout,onNav}){
  const [modal,setModal]=React.useState(null)
  const [name,setName]=React.useState(user.name)
  const [bio,setBio]=React.useState(user.bio||'')
  const [avatar,setAvatar]=React.useState(user.avatar||'👤')
  const [color,setColor]=React.useState(user.color||'#6366f1')
  const [saving,setSaving]=React.useState(false)

  const [err,setErr]=React.useState('')

    setErr('');setSaving(true)
    const{data,error}=await sb.from('users').update({name:name.trim(),bio,avatar,color}).eq('id',user.id).select().single()
    setSaving(false)

    onUserUpdate(data);setModal(null)
  }

      </div>

    </div>
    {!last&&<div style={{height:1,background:'rgba(255,255,255,.05)',margin:'0 16px'}}/>}

    <div style={{height:'100dvh',background:'#0d1420',display:'flex',flexDirection:'column',direction:'rtl',overflowY:'auto'}}>

        <div style={{marginTop:20,marginBottom:20}}>
          <div onClick={()=>setModal('profile')} style={{background:`linear-gradient(135deg,${user.color||'#6366f1'}15,${user.color||'#6366f1'}05)`,border:`1px solid ${user.color||'#6366f1'}22`,borderRadius:20,padding:'18px',display:'flex',alignItems:'center',gap:16,cursor:'pointer'}}>

            <span style={{color:'#64748b',fontSize:22}}>›</span>

        <div style={{color:'#6366f1',fontSize:11,fontWeight:800,letterSpacing:1,padding:'0 0 6px'}}>الحساب</div>

function AdminPanel({user,onBack}){
  const [tab,setTab]=React.useState('users')
  const [users,setUsers]=React.useState([])
  const [groups,setGroups]=React.useState([])
  const [loading,setLoading]=React.useState(true)
  const [broadcast,setBroadcast]=React.useState('')
  const [bGroup,setBGroup]=React.useState('all')
  const [bType,setBType]=React.useState('announcement')
  const [sending,setSending]=React.useState(false)
  const [sentOk,setSentOk]=React.useState(false)

  React.useEffect(()=>{loadAll()},[])

  async function loadAll(){
    setLoading(true)
    const[{data:us},{data:gs}]=await Promise.all([
      sb.from('users').select('*').order('created_at'),
      sb.from('groups').select('*,group_members(user_id)').order('created_at'),
    ])
    setUsers(us||[])
    setGroups((gs||[]).map(g=>({...g,memberIds:(g.group_members||[]).map(m=>m.user_id)})))
    setLoading(false)
  }

  async function changeRole(uid,role){
    await sb.from('users').update({role}).eq('id',uid)
    setUsers(prev=>prev.map(u=>u.id===uid?{...u,role}:u))
  }

  async function deleteUser(uid){
    if(!confirm('هل أنت متأكد؟'))return
    await sb.from('users').delete().eq('id',uid)
    setUsers(prev=>prev.filter(u=>u.id!==uid))
  }

  async function deleteGroup(gid){
    if(!confirm('هل أنت متأكد؟'))return
    await sb.from('groups').delete().eq('id',gid)
    setGroups(prev=>prev.filter(g=>g.id!==gid))
  }

  async function sendBroadcast(){
    if(!broadcast.trim())return
    setSending(true)
    const targets=bGroup==='all'?groups:groups.filter(g=>g.id===bGroup)
    await Promise.all(targets.map(g=>sb.from('messages').insert({group_id:g.id,sender_id:user.id,text:broadcast.trim(),type:bType,reactions:{}})))
    setSending(false);setSentOk(true);setBroadcast('')
    setTimeout(()=>setSentOk(false),3000)
  }

  const TABS=[{id:'users',icon:'👥',label:'المستخدمون'},{id:'groups',icon:'💬',label:'المجموعات'},{id:'broadcast',icon:'📣',label:'إرسال جماعي'}]

  return(
    <div style={{height:'100dvh',background:'#0d1420',display:'flex',flexDirection:'column',direction:'rtl'}}>
      <div style={{background:'linear-gradient(180deg,#14102a 0%,#1a2235 100%)',padding:'44px 18px 14px',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
          <button onClick={onBack} style={{width:38,height:38,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:12,color:'#94a3b8',fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
          <div>
            <div style={{color:'#f1f5f9',fontWeight:800,fontSize:20}}>🛡️ لوحة الإدارة</div>
            <div style={{color:'#64748b',fontSize:12}}>تحكم كامل في المنصة</div>
          </div>
        </div>
        <div style={{display:'flex',gap:6}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'9px 6px',background:tab===t.id?'rgba(99,102,241,.2)':'rgba(255,255,255,.05)',border:tab===t.id?'1.5px solid rgba(99,102,241,.5)':'1px solid rgba(255,255,255,.1)',borderRadius:12,color:tab===t.id?'#a5b4fc':'#64748b',fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
              <span style={{fontSize:18}}>{t.icon}</span><span>{t.label}</span>
            </button>
          ))}
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'12px 18px'}}>
        {loading?<div style={{display:'flex',justifyContent:'center',padding:40}}><Spin/></div>:

        tab==='users'?(
          users.map(u=>(
            <div key={u.id} style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:16,padding:'14px 16px',marginBottom:10,display:'flex',alignItems:'center',gap:14}}>
              <Avatar user={u} size={46}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:'#f1f5f9',fontWeight:700,fontSize:15}}>{u.name}</div>
                <div style={{color:'#64748b',fontSize:12,marginTop:2}}>{u.email||'—'}</div>
                <div style={{marginTop:8,display:'flex',gap:6,flexWrap:'wrap'}}>
                  {['admin','teacher','student'].map(role=>(
                    <button key={role} onClick={()=>changeRole(u.id,role)} disabled={u.id===user.id&&role!=='admin'}
                      style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,cursor:'pointer',
                        background:u.role===role?(role==='admin'?'rgba(99,102,241,.25)':role==='teacher'?'rgba(14,165,233,.25)':'rgba(16,185,129,.25)'):'rgba(255,255,255,.05)',
                        border:u.role===role?(role==='admin'?'1.5px solid rgba(99,102,241,.6)':role==='teacher'?'1.5px solid rgba(14,165,233,.6)':'1.5px solid rgba(16,185,129,.6)'):'1px solid rgba(255,255,255,.1)',
                        color:u.role===role?(role==='admin'?'#a5b4fc':role==='teacher'?'#7dd3fc':'#6ee7b7'):'#64748b'}}>
                      {role==='admin'?'مدير':role==='teacher'?'مدرس':'طالب'}
                    </button>
                  ))}
                </div>
              </div>
              {u.id!==user.id&&<button onClick={()=>deleteUser(u.id)} style={{width:34,height:34,background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:10,color:'#f87171',cursor:'pointer',fontSize:16,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>🗑️</button>}
            </div>
          ))

        ):tab==='groups'?(
          groups.map(g=>(
            <div key={g.id} style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:16,padding:'14px 16px',marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
                <div style={{width:46,height:46,borderRadius:14,background:g.color+'18',border:`2px solid ${g.color}33`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{g.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:'#f1f5f9',fontWeight:700,fontSize:15}}>{g.name}</div>
                  <div style={{color:'#64748b',fontSize:12}}>{g.memberIds?.length||0} عضو</div>
                  {g.join_code&&<div style={{color:'#6366f1',fontSize:11,fontWeight:700,marginTop:2}}>كود: <span style={{direction:'ltr',display:'inline-block',letterSpacing:1}}>{g.join_code}</span></div>}
                </div>
                <button onClick={()=>deleteGroup(g.id)} style={{width:34,height:34,background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:10,color:'#f87171',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>🗑️</button>
              </div>
            </div>
          ))

        ):(
          <div>
            <div style={{background:'rgba(99,102,241,.1)',border:'1px solid rgba(99,102,241,.25)',borderRadius:14,padding:'14px 16px',marginBottom:16}}>
              <p style={{color:'#a5b4fc',fontWeight:700,fontSize:14,marginBottom:4}}>📣 إرسال لجميع المجموعات</p>
              <p style={{color:'#64748b',fontSize:12}}>اكتب رسالة ستُرسل لمجموعة أو لكل المجموعات</p>
            </div>
            <label style={{color:'#94a3b8',fontSize:13,display:'block',marginBottom:8}}>المجموعة المستهدفة</label>
            <select value={bGroup} onChange={e=>setBGroup(e.target.value)} style={{width:'100%',padding:'12px 14px',background:'rgba(255,255,255,.07)',border:'1.5px solid rgba(255,255,255,.1)',borderRadius:12,color:'#fff',fontSize:14,outline:'none',marginBottom:12,boxSizing:'border-box'}}>
              <option value="all">كل المجموعات</option>

            <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
              {[['announcement','📢 إعلان'],['schedule','📅 جدول'],['general','💬 عام']].map(([v,l])=>(
                <button key={v} onClick={()=>setBType(v)} style={{padding:'7px 14px',borderRadius:20,background:bType===v?'rgba(99,102,241,.2)':'rgba(255,255,255,.05)',border:bType===v?'1.5px solid rgba(99,102,241,.5)':'1px solid rgba(255,255,255,.1)',color:bType===v?'#a5b4fc':'#64748b',fontSize:12,fontWeight:600,cursor:'pointer'}}>{l}</button>
              ))}
            </div>
            <textarea value={broadcast} onChange={e=>setBroadcast(e.target.value)} rows={5} placeholder="اكتب رسالتك هنا..."
              style={{width:'100%',padding:'13px 14px',background:'rgba(255,255,255,.07)',border:'1.5px solid rgba(255,255,255,.1)',borderRadius:14,color:'#e2e8f0',fontSize:14,outline:'none',resize:'none',boxSizing:'border-box',marginBottom:14}}/>
            {sentOk&&<div style={{background:'rgba(16,185,129,.12)',border:'1px solid rgba(16,185,129,.3)',borderRadius:10,padding:'10px',color:'#34d399',fontSize:13,textAlign:'center',marginBottom:12}}>✅ تم الإرسال!</div>}
            <button onClick={sendBroadcast} disabled={!broadcast.trim()||sending}
              style={{width:'100%',padding:14,background:broadcast.trim()?'linear-gradient(135deg,#6366f1,#7c3aed)':'rgba(255,255,255,.07)',border:'none',borderRadius:14,color:broadcast.trim()?'#fff':'#475569',fontSize:16,fontWeight:700,cursor:broadcast.trim()?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>

          </div>
        )}
      </div>
    </div>
  )
}

function App(){
  const [authUser,setAuthUser]=React.useState(null)
  const [profile,setProfile]=React.useState(null)
  const [screen,setScreen]=React.useState('groups')
  const [curGroup,setCurGroup]=React.useState(null)
  const [groups,setGroups]=React.useState([])
  const [users,setUsers]=React.useState([])
  const [messages,setMessages]=React.useState({})
  const [ready,setReady]=React.useState(false)
  const [showCreate,setShowCreate]=React.useState(false)
  const rtRef=React.useRef(null)

  React.useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user)handleAuthUser(session.user)
      else setReady(true)
    })
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user)handleAuthUser(session.user)
      else{setAuthUser(null);setProfile(null);setReady(true)}
    })
    return()=>subscription.unsubscribe()
  },[])

  async function handleAuthUser(au){
    setAuthUser(au)
    const{data}=await sb.from('users').select('*').eq('id',au.id).single()
    if(data){setProfile(data);await loadData(data)}
    else setProfile(null)
    setReady(true)
  }

  async function loadData(p){
    const prof=p||profile;if(!prof)return
    const[{data:allUsers},{data:memRows}]=await Promise.all([
      sb.from('users').select('*'),
      sb.from('group_members').select('group_id').eq('user_id',prof.id),
    ])
    const gids=(memRows||[]).map(r=>r.group_id)
    setUsers(allUsers||[])
    if(!gids.length){setGroups([]);return}
    const{data:grps}=await sb.from('groups').select('*').in('id',gids).order('created_at')
    setGroups(grps||[])
    subscribeRealtime(prof)
  }

  async function loadMsgs(gid){
    const{data}=await sb.from('messages').select('*').eq('group_id',gid).order('created_at',{ascending:true}).limit(200)
    setMessages(prev=>({...prev,[gid]:data||[]}))
  }

  function subscribeRealtime(p){
    if(rtRef.current)sb.removeChannel(rtRef.current)
    rtRef.current=sb.channel('rt').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},msg=>{
      const m=msg.new
      setMessages(prev=>{
        if((prev[m.group_id]||[]).find(x=>x.id===m.id))return prev
        return{...prev,[m.group_id]:[...(prev[m.group_id]||[]),m]}
      })
    }).on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},msg=>{
      const m=msg.new
      setMessages(prev=>({...prev,[m.group_id]:(prev[m.group_id]||[]).map(x=>x.id===m.id?m:x)}))
    }).subscribe()
  }

  async function openGroup(g){
    setCurGroup(g);setScreen('chat')
    if(!messages[g.id])await loadMsgs(g.id)
  }

  async function sendMessage(gid,text,type){
    const{data,error}=await sb.from('messages').insert({group_id:gid,sender_id:profile.id,text,type,reactions:{}}).select().single()
    if(!error&&data)setMessages(prev=>({...prev,[gid]:[...(prev[gid]||[]),data]}))
  }

  async function reactToMsg(gid,msgId,emoji){
    const msg=(messages[gid]||[]).find(m=>m.id===msgId);if(!msg)return
    const reactions={...(msg.reactions||{})}
    if(!reactions[emoji])reactions[emoji]=[]
    reactions[emoji]=reactions[emoji].includes(profile.id)?reactions[emoji].filter(id=>id!==profile.id):[...reactions[emoji],profile.id]
    await sb.from('messages').update({reactions}).eq('id',msgId)
    setMessages(prev=>({...prev,[gid]:(prev[gid]||[]).map(m=>m.id===msgId?{...m,reactions}:m)}))
  }

  if(!ready)return(
    <div style={{height:'100dvh',background:'#0d1420',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20}}>
      <div style={{width:88,height:88,borderRadius:26,background:'linear-gradient(135deg,#6366f1,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:46,boxShadow:'0 16px 48px rgba(99,102,241,.5)'}}>🎓</div>
      <Spin size={32}/>
    </div>
  )

  if(!authUser)return <LoginScreen/>
  if(!profile)return <ProfileSetup authUser={authUser} onDone={()=>handleAuthUser(authUser)}/>
  if(screen==='admin')return <AdminPanel user={profile} onBack={()=>setScreen('groups')}/>
  if(screen==='settings')return <SettingsScreen user={profile} onUserUpdate={u=>{setProfile(u);setUsers(prev=>prev.map(x=>x.id===u.id?u:x))}} onLogout={()=>{setAuthUser(null);setProfile(null)}} onNav={setScreen}/>
  if(screen==='chat'&&curGroup)return <ChatScreen user={profile} users={users} group={curGroup} messages={messages[curGroup.id]} onSend={sendMessage} onReact={reactToMsg} onBack={()=>setScreen('groups')}/>

  return(
    <>
      <GroupsList user={profile} groups={groups} messages={messages} users={users} onOpen={openGroup} onNav={setScreen}
        onJoin={()=>loadData()} onCreateGroup={()=>setShowCreate(true)}/>
      {showCreate&&<CreateGroupModal user={profile} onDone={async(g)=>{setShowCreate(false);await loadData();await openGroup(g)}} onClose={()=>setShowCreate(false)}/>}
    </>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
