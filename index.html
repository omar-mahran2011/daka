<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--or:#E84800;--ord:#C03A00;--orl:#FF6B2B;--red:#CC1100;--cr:#FFF5F0;--dk:#1A0800}
body{font-family:'Cairo',sans-serif;background:var(--cr);color:var(--dk);overflow-x:hidden;min-height:100vh}
#loader{position:fixed;inset:0;background:#1A0800;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s}
#loader.out{opacity:0;visibility:hidden;pointer-events:none}
.loader-scene{position:relative;width:170px;height:130px}
.can{position:absolute;width:68px;height:88px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:32px;color:#fff;font-weight:900;box-shadow:0 10px 30px rgba(0,0,0,.6);animation:canSpin 2s ease-in-out infinite}
.can-s{background:linear-gradient(150deg,#FF6B2B,#E84800);top:0;right:10px;animation-delay:0s}
.can-d{background:linear-gradient(150deg,#C03A00,#8B2000);bottom:0;left:10px;animation-delay:-1s}
.can-lbl{font-size:9px;letter-spacing:2px;margin-top:4px;opacity:.85}
@keyframes canSpin{0%{transform:rotateY(0deg) scale(1)}25%{transform:rotateY(90deg) scale(.82)}50%{transform:rotateY(180deg) scale(1)}75%{transform:rotateY(270deg) scale(.82)}100%{transform:rotateY(360deg) scale(1)}}
.ld-title{color:#fff;font-size:26px;font-weight:900;margin-top:28px}
.ld-sub{color:rgba(255,255,255,.45);font-size:13px;margin-top:6px}
.ld-dots{display:flex;gap:5px;margin-top:14px}
.ld-dots span{width:9px;height:9px;background:var(--or);border-radius:50%;animation:ldot .8s ease-in-out infinite alternate}
.ld-dots span:nth-child(2){animation-delay:.22s}
.ld-dots span:nth-child(3){animation-delay:.44s}
@keyframes ldot{0%{transform:translateY(0);opacity:.3}100%{transform:translateY(-9px);opacity:1}}
header{background:var(--or);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 14px rgba(0,0,0,.28)}
.logo{color:#fff;font-size:22px;font-weight:900;line-height:1}
.logo small{display:block;font-size:11px;font-weight:400;opacity:.8;margin-top:1px}
.hdr-btn{color:#fff;font-size:12px;font-weight:700;text-decoration:none;background:rgba(255,255,255,.18);padding:7px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.28)}
.hero{background:linear-gradient(155deg,var(--ord) 0%,var(--or) 55%,var(--orl) 100%);padding:38px 18px 32px;text-align:center;position:relative;overflow:hidden}
.hero::before,.hero::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,.06)}
.hero::before{width:280px;height:280px;top:-110px;left:-70px}
.hero::after{width:200px;height:200px;bottom:-80px;right:-40px}
.hero-badge{display:inline-block;background:var(--red);color:#fff;font-size:12px;font-weight:700;padding:4px 14px;border-radius:20px;margin-bottom:10px;animation:fuD .6s ease both}
.hero h2{color:#fff;font-size:38px;font-weight:900;line-height:1.1;animation:fuD .6s .1s ease both;text-shadow:0 2px 12px rgba(0,0,0,.2)}
.hero-sub{color:rgba(255,255,255,.88);font-size:14px;margin-top:8px;animation:fuD .6s .2s ease both}
@keyframes fuD{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.sec-title{font-size:20px;font-weight:900;color:var(--ord);padding:22px 16px 12px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:2px;background:linear-gradient(to left,transparent,var(--or));opacity:.22}
.offers-row{display:flex;gap:14px;overflow-x:auto;padding:0 16px 16px;scrollbar-width:none}
.offers-row::-webkit-scrollbar{display:none}
.offer-card{flex-shrink:0;width:270px;border-radius:20px;overflow:hidden;box-shadow:0 6px 22px rgba(0,0,0,.13);position:relative;background:#fff}
.offer-img{width:100%;height:150px;object-fit:cover;display:block}
.offer-ph{width:100%;height:150px;display:flex;align-items:center;justify-content:center;font-size:44px}
.offer-disc{position:absolute;top:10px;left:10px;background:var(--red);color:#fff;font-size:16px;font-weight:900;padding:5px 9px;border-radius:10px}
.offer-body{padding:13px}
.offer-bdg{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:14px;color:#fff;margin-bottom:5px}
.offer-name{font-size:15px;font-weight:900;color:var(--dk)}
.offer-desc{font-size:12px;color:#888;margin-top:3px;line-height:1.5}
.tabs-wrap{position:sticky;top:54px;z-index:90;background:var(--cr);padding:8px 0 6px;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.tabs{display:flex;gap:8px;overflow-x:auto;padding:0 16px;scrollbar-width:none}

.tab-btn{flex-shrink:0;padding:7px 15px;border:2px solid var(--or);border-radius:26px;background:#fff;color:var(--or);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn.active,.tab-btn:hover{background:var(--or);color:#fff}
main{padding:6px 14px 150px;max-width:720px;margin:0 auto}
.msec-title{font-size:19px;font-weight:900;color:var(--ord);padding:18px 0 10px;display:flex;align-items:center;gap:8px}
.item-card{background:#fff;border-radius:16px;display:flex;align-items:stretch;margin-bottom:9px;overflow:hidden;box-shadow:0 2px 8px rgba(232,72,0,.07);border:1.5px solid transparent;transition:border-color .2s,transform .25s,box-shadow .25s;opacity:0;transform:translateY(14px)}
.item-card.vis{opacity:1;transform:translateY(0);transition:opacity .4s ease,transform .4s ease,border-color .2s,box-shadow .2s}
.item-card:hover{border-color:var(--orl);box-shadow:0 5px 18px rgba(232,72,0,.14);transform:translateY(-2px)}
.qty-col{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 11px;background:var(--cr);border-left:1.5px solid #ffe0d0;min-width:50px}
.qty-btn{background:var(--or);border:none;color:#fff;width:27px;height:27px;border-radius:50%;font-size:18px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s;font-family:'Cairo',sans-serif;line-height:1}
.qty-btn:hover{background:var(--ord);transform:scale(1.12)}
.qty-btn:active{transform:scale(.9)}
.qty-num{font-size:15px;font-weight:900;color:var(--dk);min-width:18px;text-align:center}
.item-info{flex:1;padding:11px 13px;display:flex;flex-direction:column;justify-content:center}
.item-name{font-size:14px;font-weight:700;color:var(--dk);line-height:1.3}
.item-price{font-size:15px;font-weight:900;color:var(--or);margin-top:4px}
.item-img{width:86px;min-width:86px;height:86px;object-fit:cover;display:block}
.item-ph{width:86px;min-width:86px;height:86px;background:linear-gradient(135deg,#ffe8dd,#ffd0bd);display:flex;align-items:center;justify-content:center;font-size:26px}
.cart-float{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--or);color:#fff;border:none;border-radius:50px;padding:13px 26px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 28px rgba(232,72,0,.48);display:flex;align-items:center;gap:9px;z-index:200;transition:opacity .3s,transform .3s;white-space:nowrap}
.cart-float.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(18px)}
.cart-cnt{background:#fff;color:var(--or);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:300;display:none;backdrop-filter:blur(2px)}
.overlay.open{display:block}
.cart-panel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:26px 26px 0 0;padding:18px 18px 28px;z-index:400;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .38s cubic-bezier(.34,1.56,.64,1);max-width:720px;margin:0 auto}
.cart-panel.open{transform:translateY(0)}
.cart-handle{width:42px;height:5px;background:#e0d0cc;border-radius:4px;margin:0 auto 16px}
.cart-head{font-size:19px;font-weight:900;color:var(--ord);text-align:center;margin-bottom:14px}
.ci{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid #f5ede8}
.ci-img{width:46px;height:46px;border-radius:9px;object-fit:cover;flex-shrink:0}
.ci-ph{width:46px;height:46px;border-radius:9px;background:linear-gradient(135deg,#ffe8dd,#ffd0bd);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

.total-row span:last-child{color:var(--or)}
.order-form{margin-top:18px}
.type-tog{display:flex;gap:9px;margin-bottom:14px}
.type-btn{flex:1;padding:9px;border:2px solid #e8d0c8;border-radius:11px;background:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:#bbb;transition:all .2s}

.fg{margin-bottom:12px}

.wa-btn{width:100%;background:#25D366;color:#fff;border:none;border-radius:14px;padding:14px;font-family:'Cairo',sans-serif;font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:9px;box-shadow:0 4px 18px rgba(37,211,102,.32);transition:transform .2s,background .2s}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--or);color:#fff;padding:11px 26px;border-radius:28px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}

28d307?w=400&q=80"},{id:"h3",name:"أرز باللبن بسبوسة",price:30,img:"https://images.unsplash.com/photo-1551024506-0bccd828d307?w=400&q=80"}]},{section:"مشروبات",emoji:"🥤",items:[{id:"dr1",name:"مياه معدنية",price:10,img:""},{id:"dr2",name:"كانز بيبسي/سفن/ميرندا",price:20,img:""},{id:"dr3",name:"في كولا",price:25,img:""}]},{section:"إضافات",emoji:"➕",items:[{id:"ex1",name:"دقة",price:5,img:""},{id:"ex2",name:"شطة زيت",price:7,img:""},{id:"ex3",name:"حمص",price:10,img:""},{id:"ex4",name:"عدس",price:10,img:""},{id:"ex5",name:"تقلية",price:10,img:""},{id:"ex6",name:"صلصة",price:10,img:""},{id:"ex7",name:"سلطة خضراء",price:10,img:""},{id:"ex8",name:"قراميشو",price:10,img:""},{id:"ex9",name:"تومية",price:10,img:""},{id:"ex10",name:"خيار مخلل",price:10,img:""}]}];
const DEFAULT_OFFERS=[{id:"o1",title:"خصم 25% على كل المنيو",desc:"احتفالاً بافتتاح الموقع",discount:"25%",badge:"🎊 عرض الافتتاح",img:"https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600&q=80",color:"#E84800"},{id:"o2",title:"كومبو العيلة",desc:"3 كشري لارج + 3 عصائر بسعر خيالي",discount:"20%",badge:"🔥 الأكثر طلباً",img:"https://images.unsplash.com/photo-1585937421612-70a008356fbe?w=600&q=80",color:"#CC1100"}];

let menu=[], offers=[], cart={}, orderType='delivery';

async function sbGet(table) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.main`, {
      headers: {'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`}
    });
    const d = await r.json();
    return d && d[0] ? d[0].data : null;
  } catch(e) { return null; }
}

async function loadData() {
  const [m, o] = await Promise.all([sbGet('menu'), sbGet('offers')]);
  menu = (m && m.length) ? m : DEFAULT_MENU;
  offers = (o && o.length) ? o : DEFAULT_OFFERS;
}

window.addEventListener('load', async () => {
  await loadData();
  renderTabs(); renderMenu(); renderOffers();
  setTimeout(setupReveal, 100);
  document.getElementById('loader').classList.add('out');
});

function renderOffers() {
  const c=document.getElementById('offersRow');
  if(!offers.length){c.innerHTML='<p style="padding:0 16px;color:#bbb;font-size:13px">مفيش عروض دلوقتي</p>';return}
  c.innerHTML=offers.map((o,i)=>`
    <div class="offer-card" style="animation:fuD .5s ease ${i*.1}s both">
      ${o.img?`<img class="offer-img" src="${o.img}" onerror="this.style.display='none'">`:``}
      <div class="offer-ph" style="${o.img?'display:none':''}background:${o.color||'#E84800'}">🎁</div>
      <div class="offer-disc">${o.discount||''}</div>
      <div class="offer-body">
        <span class="offer-bdg" style="background:${o.color||'#E84800'}">${o.badge||''}</span>
        <div class="offer-name">${o.title}</div>
        <div class="offer-desc">${o.desc}</div>
      </div>
    </div>`).join('');
}

function renderTabs() {
  document.getElementById('tabsEl').innerHTML=menu.map((s,i)=>
    `<button class="tab-btn${i===0?' active':''}" onclick="goSec('sec${i}',this)">${s.emoji} ${s.section}</button>`).join('');
}

function renderMenu() {
  document.getElementById('menuEl').innerHTML=menu.map((s,si)=>`
    <div id="sec${si}">
      <div class="msec-title">${s.emoji} ${s.section}</div>
      ${s.items.map(it=>`
        <div class="item-card" id="card${it.id}">
          <div class="qty-col">
            <button class="qty-btn" onclick="chQty('${it.id}',-1)">−</button>
            <span class="qty-num" id="q${it.id}">0</span>
            <button class="qty-btn" onclick="chQty('${it.id}',1)">+</button>
          </div>
          <div class="item-info">
            <div class="item-name">${it.name}</div>
            <div class="item-price">${it.price} ج</div>
          </div>
          ${it.img?`<img class="item-img" src="${it.img}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="item-ph" style="display:none">${s.emoji}</div>`:`<div class="item-ph">${s.emoji}</div>`}
        </div>`).join('')}
    </div>`).join('');
}

function setupReveal() {
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target)}})},{threshold:.1});
  document.querySelectorAll('.item-card').forEach(c=>obs.observe(c));
}

function goSec(id,btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});
}

function findIt(id){for(const s of menu)for(const i of s.items)if(i.id===id)return i;return null}

function chQty(id,d) {
  const it=findIt(id);if(!it)return;
  if(!cart[id])cart[id]={...it,qty:0};
  cart[id].qty+=d;
  if(cart[id].qty<=0)delete cart[id];
  const el=document.getElementById('q'+id);if(el)el.textContent=cart[id]?.qty||0;
  updFloat();
  if(document.getElementById('cartPanel').classList.contains('open'))renderCItems();
}

function updFloat() {
  const tot=Object.values(cart).reduce((s,i)=>s+i.qty,0);
  const pr=Object.values(cart).reduce((s,i)=>s+i.qty*i.price,0);
  document.getElementById('cfCount').textContent=tot;
  document.getElementById('cfText').textContent=`السلة · ${pr} ج`;
  document.getElementById('cartFloat').classList.toggle('hidden',tot===0);
}

function openCart(){document.getElementById('overlay').classList.add('open');document.getElementById('cartPanel').classList.add('open');renderCItems()}
function closeCart(){document.getElementById('overlay').classList.remove('open');document.getElementById('cartPanel').classList.remove('open')}

function renderCItems() {
  const items=Object.entries(cart);
  const el=document.getElementById('cartItemsEl');
  const empty=document.getElementById('emptyCart');
  const sum=document.getElementById('cartSum');
  if(!items.length){el.innerHTML='';empty.style.display='block';sum.style.display='none';return}
  empty.style.display='none';sum.style.display='block';
  let tot=0;
  el.innerHTML=items.map(([id,it])=>{
    const s=it.qty*it.price;tot+=s;
    return`<div class="ci">
      ${it.img?`<img class="ci-img" src="${it.img}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="ci-ph" style="display:none">🍜</div>`:`<div class="ci-ph">🍜</div>`}
      <div class="ci-info"><div class="ci-name">${it.name}</div><div class="ci-sub">${it.qty} × ${it.price} ج</div></div>
      <div class="ci-price">${s} ج</div>
      <button class="ci-rm" onclick="rmItem('${id}')">✕</button>
    </div>`;
  }).join('');
  document.getElementById('cartTotal').textContent=tot+' ج';
}

function rmItem(id){const el=document.getElementById('q'+id);if(el)el.textContent=0;delete cart[id];updFloat();renderCItems()}

function setType(t) {
  orderType=t;
  document.getElementById('btnD').classList.toggle('active',t==='delivery');
  document.getElementById('btnP').classList.toggle('active',t==='pickup');
  document.getElementById('fAddrG').style.display=t==='delivery'?'block':'none';
}

function sendOrder() {
  const name=document.getElementById('fName').value.trim();
  const phone=document.getElementById('fPhone').value.trim();
  const addr=document.getElementById('fAddr').value.trim();
  const notes=document.getElementById('fNotes').value.trim();
  if(!name){alert('من فضلك ادخل اسمك');return}
  if(!phone){alert('من فضلك ادخل التليفون');return}
  if(orderType==='delivery'&&!addr){alert('من فضلك ادخل العنوان');return}
  if(!Object.keys(cart).length){alert('السلة فاضية!');return}
  const items=Object.values(cart);let tot=0;
  const lines=items.map(i=>{tot+=i.qty*i.price;return`• ${i.name} × ${i.qty} = ${i.qty*i.price} ج`}).join('\n');
  let msg=`🍜 *طلب جديد — كشري دقة*\n\n👤 ${name}\n📞 ${phone}\n🚚 ${orderType==='delivery'?'توصيل':'استلام'}\n`;
  if(orderType==='delivery')msg+=`📍 ${addr}\n`;
  if(notes)msg+=`📝 ${notes}\n`;
  msg+=`\n🧾 *الطلب:*\n${lines}\n\n💰 *الإجمالي: ${tot} ج*\n💵 كاش عند الاستلام`;
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,'_blank');
}

let tT;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),2500)}
</script>
