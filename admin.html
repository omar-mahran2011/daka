<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — كشري دقة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--or:#E84800;--ord:#C03A00;--orl:#FF6B2B;--red:#CC1100;--bg:#0F0800;--card:#1C1008;--bdr:#3A1C08;--tx:#F5E8E0;--sub:#9A7060}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
#loginScreen.out{display:none}
.lbox{background:var(--card);border:1px solid var(--bdr);border-radius:24px;padding:40px 30px;width:330px;max-width:94vw;text-align:center;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.lbox .ico{font-size:48px;margin-bottom:8px}
.lbox h2{color:#fff;font-size:22px;font-weight:900;margin-bottom:4px}
.lbox p{color:var(--sub);font-size:13px;margin-bottom:24px}
.lbox input{width:100%;padding:12px;border:2px solid var(--bdr);border-radius:12px;background:rgba(255,255,255,.05);font-family:'Cairo',sans-serif;font-size:16px;color:#fff;outline:none;text-align:center;letter-spacing:3px;margin-bottom:12px;transition:border-color .2s}
.lbox input:focus{border-color:var(--or)}
.lbtn{width:100%;padding:13px;background:var(--or);color:#fff;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s}
.lbtn:hover{background:var(--ord)}
.lerr{color:#ff7070;font-size:12px;margin-top:8px;min-height:18px}

/* HEADER */
header{background:linear-gradient(135deg,var(--ord),var(--or));padding:15px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 18px rgba(0,0,0,.4)}
.hl{color:#fff;font-size:18px;font-weight:900}
.hr{display:flex;gap:8px}
.hbtn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);padding:7px 14px;border-radius:18px;font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer;transition:background .2s;text-decoration:none}
.hbtn:hover{background:rgba(255,255,255,.25)}

/* APP */
#app{display:none}
#app.show{display:block}

/* TABS */
.atabs{display:flex;border-bottom:2px solid var(--bdr);background:var(--card)}
.atab{padding:14px 18px;background:none;border:none;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;color:var(--sub);cursor:pointer;position:relative;transition:color .2s}
.atab.active{color:var(--or)}
.atab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--or)}

.abody{padding:20px 16px;max-width:860px;margin:0 auto}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.sbox{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px;text-align:center}
.snum{font-size:26px;font-weight:900;color:var(--or)}
.slbl{font-size:11px;color:var(--sub);margin-top:3px}

.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.sec-hd h3{color:#fff;font-size:18px;font-weight:900}
.btn-add{background:var(--or);color:#fff;border:none;border-radius:11px;padding:9px 18px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s,transform .15s}
.btn-add:hover{background:var(--ord);transform:scale(1.03)}

/* OFFER CARDS */
.ogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.oc{background:var(--card);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.oc-img{width:100%;height:130px;object-fit:cover;display:block;background:#2a1208}
.oc-body{padding:12px}
.oc-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
.oc-desc{font-size:11px;color:var(--sub);line-height:1.5;margin-bottom:8px}
.oc-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:14px}
.pill-or{background:rgba(232,72,0,.22);color:var(--orl)}
.pill-rd{background:rgba(204,17,0,.22);color:#ff7070}
.oc-acts{display:flex;gap:8px}
.btn-edit{flex:1;padding:7px;background:rgba(232,72,0,.15);color:var(--orl);border:1px solid rgba(232,72,0,.3);border-radius:9px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:background .2s}
.btn-edit:hover{background:rgba(232,72,0,.28)}
.btn-del{flex:1;padding:7px;background:rgba(204,17,0,.12);color:#ff7070;border:1px solid rgba(204,17,0,.28);border-radius:9px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:background .2s}
.btn-del:hover{background:rgba(204,17,0,.25)}

/* MENU */
.msec{margin-bottom:24px}
.msec-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;border-bottom:1px solid var(--bdr);margin-bottom:10px}
.msec-hd h4{font-size:15px;font-weight:900;color:var(--or)}
.msec-acts{display:flex;gap:6px}
.btn-xs{background:rgba(232,72,0,.15);color:var(--orl);border:1px solid rgba(232,72,0,.28);border-radius:7px;padding:4px 10px;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:background .2s}
.btn-xs:hover{background:rgba(232,72,0,.28)}
.btn-xs-del{background:rgba(204,17,0,.12);color:#ff7070;border:1px solid rgba(204,17,0,.25);border-radius:7px;padding:4px 10px;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;cursor:pointer}
.irow{display:flex;align-items:center;gap:10px;padding:8px;background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:7px;border:1px solid var(--bdr);animation:fadeUp .3s ease}
.irow-img{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#2a1208}
.irow-ph{width:48px;height:48px;border-radius:8px;flex-shrink:0;background:rgba(232,72,0,.12);display:flex;align-items:center;justify-content:center;font-size:20px}
.irow-info{flex:1}
.irow-name{font-size:13px;font-weight:700;color:#fff}
.irow-price{font-size:12px;color:var(--or);font-weight:700;margin-top:2px}
.irow-del{background:none;border:none;color:#555;font-size:16px;cursor:pointer;padding:0 4px;transition:color .2s}
.irow-del:hover{color:#ff7070}
.empty-adm{text-align:center;padding:36px;color:#555;border:1.5px dashed var(--bdr);border-radius:14px}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:5000;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.mbg.open{display:flex}
.mbox{background:var(--card);border-radius:22px 22px 0 0;padding:22px 18px 30px;width:100%;max-width:580px;max-height:88vh;overflow-y:auto;animation:mUp .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes mUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-handle{width:40px;height:5px;background:var(--bdr);border-radius:4px;margin:0 auto 18px}
.m-title{font-size:17px;font-weight:900;color:#fff;text-align:center;margin-bottom:18px}
.mfg{margin-bottom:14px}
.mfg label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:5px}
.mfg input,.mfg textarea,.mfg select{width:100%;padding:10px 13px;background:rgba(255,255,255,.06);border:1.5px solid var(--bdr);border-radius:11px;font-family:'Cairo',sans-serif;font-size:14px;color:#fff;outline:none;transition:border-color .2s}
.mfg input:focus,.mfg textarea:focus,.mfg select:focus{border-color:var(--or)}
.mfg select option{background:var(--bg)}
.mfg textarea{resize:vertical;min-height:64px}
.ip{width:100%;height:110px;border-radius:10px;object-fit:cover;margin-top:7px;display:none;border:1.5px solid var(--bdr)}
.ip.show{display:block}
.m-btns{display:flex;gap:9px;margin-top:18px}
.m-cancel{flex:1;padding:12px;background:rgba(255,255,255,.05);color:var(--sub);border:1.5px solid var(--bdr);border-radius:11px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.m-save{flex:2;padding:12px;background:var(--or);color:#fff;border:none;border-radius:11px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s}
.m-save:hover{background:var(--ord)}

/* SAVING INDICATOR */
.saving{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(232,72,0,.9);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.saving.show{opacity:1}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--or);color:#fff;padding:11px 26px;border-radius:28px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.atab-pane{display:none}.atab-pane.active{display:block}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lbox">
    <div class="ico">🔐</div>
    <h2>لوحة التحكم</h2>
    <p>كشري دقة — Admin Panel</p>
    <input type="password" id="aPass" placeholder="كلمة السر" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="lbtn" onclick="tryLogin()">دخول</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="hl">🍜 كشري دقة <span style="font-size:12px;opacity:.6;font-weight:400">Admin</span></div>
    <div class="hr">
      <a href="index.html" class="hbtn">← الموقع</a>
      <button class="hbtn" onclick="doLogout()">خروج</button>
    </div>
  </header>

  <div class="atabs">
    <button class="atab active" onclick="switchTab('offers',this)">🎉 العروض</button>
    <button class="atab" onclick="switchTab('menu',this)">📋 المنيو</button>
  </div>

  <div class="abody">
    <div class="stats">
      <div class="sbox"><div class="snum" id="stO">0</div><div class="slbl">عروض</div></div>
      <div class="sbox"><div class="snum" id="stI">0</div><div class="slbl">آيتم</div></div>
      <div class="sbox"><div class="snum" id="stS">0</div><div class="slbl">أقسام</div></div>
    </div>

    <div class="atab-pane active" id="tp-offers">
      <div class="sec-hd">
        <h3>العروض الحالية</h3>
        <button class="btn-add" onclick="openOM()">+ عرض جديد</button>
      </div>
      <div class="ogrid" id="ogrid"></div>
      <div class="empty-adm" id="oemp" style="display:none"><div style="font-size:36px;margin-bottom:8px">🎉</div>مفيش عروض — ضيف عرض!</div>
    </div>

    <div class="atab-pane" id="tp-menu">
      <div class="sec-hd">
        <h3>إدارة المنيو</h3>
        <button class="btn-add" onclick="openSM()">+ قسم جديد</button>
      </div>
      <div id="menuAdm"></div>
    </div>
  </div>
</div>

<!-- Offer Modal -->
<div class="mbg" id="mOffer">
  <div class="mbox">
    <div class="m-handle"></div>
    <div class="m-title" id="omTitle">عرض جديد</div>
    <div class="mfg"><label>عنوان العرض *</label><input id="oT" placeholder="مثال: خصم 25% على كل المنيو"></div>
    <div class="mfg"><label>الوصف *</label><textarea id="oD" placeholder="تفاصيل العرض..."></textarea></div>
    <div class="mfg"><label>نسبة الخصم</label><input id="oDis" placeholder="مثال: 25%"></div>
    <div class="mfg"><label>الوسم</label><input id="oBd" placeholder="مثال: 🔥 الأكثر طلباً"></div>
    <div class="mfg"><label>رابط الصورة</label><input id="oI" placeholder="https://..." oninput="prv('oI','oIP')"><img class="ip" id="oIP"></div>
    <div class="mfg"><label>لون البطاقة</label>
      <select id="oC"><option value="#E84800">برتقالي</option><option value="#CC1100">أحمر</option><option value="#1A7A1A">أخضر</option><option value="#1A3A8A">أزرق</option></select>
    </div>
    <div class="m-btns">
      <button class="m-cancel" onclick="closeM('mOffer')">إلغاء</button>
      <button class="m-save" onclick="saveOffer()">حفظ العرض</button>
    </div>
  </div>
</div>

<!-- Item Modal -->
<div class="mbg" id="mItem">
  <div class="mbox">
    <div class="m-handle"></div>
    <div class="m-title">إضافة آيتم</div>
    <input type="hidden" id="iSI">
    <div class="mfg"><label>اسم الآيتم *</label><input id="iN" placeholder="مثال: كشري جامبو"></div>
    <div class="mfg"><label>السعر (جنيه) *</label><input id="iP" type="number" placeholder="65"></div>
    <div class="mfg"><label>رابط الصورة</label><input id="iI" placeholder="https://..." oninput="prv('iI','iIP')"><img class="ip" id="iIP"></div>
    <div class="m-btns">
      <button class="m-cancel" onclick="closeM('mItem')">إلغاء</button>
      <button class="m-save" onclick="saveItem()">إضافة</button>
    </div>
  </div>
</div>

<!-- Section Modal -->
<div class="mbg" id="mSec">
  <div class="mbox">
    <div class="m-handle"></div>
    <div class="m-title">قسم جديد</div>
    <div class="mfg"><label>اسم القسم *</label><input id="sN" placeholder="مثال: مشويات"></div>
    <div class="mfg"><label>إيموجي</label><input id="sE" placeholder="🥩"></div>
    <div class="m-btns">
      <button class="m-cancel" onclick="closeM('mSec')">إلغاء</button>
      <button class="m-save" onclick="saveSec()">إضافة القسم</button>
    </div>
  </div>
</div>

<div class="saving" id="saving">💾 جاري الحفظ...</div>
<div class="toast" id="toast"></div>

// AUTH
window.tryLogin = () => {
  const v = document.getElementById('aPass').value;
  if(v === PASS){
    document.getElementById('loginScreen').classList.add('out');
    document.getElementById('app').classList.add('show');
    initData();
  } else {
    document.getElementById('lerr').textContent = 'كلمة السر غلط!';
    document.getElementById('aPass').value='';
    setTimeout(()=>document.getElementById('lerr').textContent='',2000);
  }
};
window.doLogout = () => {
  document.getElementById('app').classList.remove('show');
  document.getElementById('loginScreen').classList.remove('out');
  document.getElementById('aPass').value='';
};
